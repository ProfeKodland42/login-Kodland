<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutor´s Leveling</title>

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>
<div class="container">

    <div class="left">
        <img src="{{ url_for('static', filename='img/logo.png') }}" class="logo">

        <div class="slider">
            <img src="{{ url_for('static', filename='img/laptop.png') }}" class="illustration">

            <h2>Programa en el navegador</h2>

            <p>
                ¡La plataforma online te permite crear un juego directamente
                en esta ventana!
            </p>

            <div class="dots">
                <span class="active"></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </div>

    <div class="right">
        <div class="login">
            <h1>Hola Tutor!</h1>

            <form id="loginForm">
                <input type="text" placeholder="Usuario" id="user" required>
                <input type="password" placeholder="Contraseña" id="password" required>

                <a href="#" class="forgot">
                    ¿Olvidaste tu usuario o contraseña?
                </a>

                <button type="submit">
                    Iniciar sesión
                </button>
            </form>

            <div class="separator">
                <span></span>
                <p>o</p>
                <span></span>
            </div>

            <p class="socialText">
                Inicia sesión con redes sociales
            </p>

            <div class="social">
                <i class="bi bi-google"></i>
                <i class="bi bi-facebook"></i>
                <i class="bi bi-github"></i>
                <i class="bi bi-apple"></i>
            </div>

            <div class="register">
                ¿No tienes una cuenta?
                <a href="#">
                    Crear una cuenta
                </a>
            </div>
        </div>
    </div>

</div>

<!-- JavaScript -->
<script src="{{ url_for('static', filename='js/login.js') }}"></script>

</body>
</html>
